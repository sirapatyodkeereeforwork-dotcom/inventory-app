<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรับ-เบิกสินค้า</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}

/* LOGIN PAGE */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3}
.login-card{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:36px;margin-bottom:12px}
.login-title{font-size:18px;font-weight:500;color:#111;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:28px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-form{text-align:left;margin-bottom:16px}
.login-form label{font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:4px}
.login-form input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;outline:none;margin-bottom:12px;transition:border .15s}
.login-form input:focus{border-color:#888}
.btn-login{width:100%;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500;transition:all .15s}
.btn-login:hover{background:#333}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-error{background:#fde8e0;color:#6b1e08;border:1px solid #f0a080;border-radius:7px;padding:9px 12px;font-size:12px;margin-top:14px;display:none;text-align:left}

/* APP */
#appPage{display:none}
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;display:flex;align-items:center;flex-wrap:wrap;gap:0}
.topbar h1{font-size:15px;font-weight:500;padding:13px 0;margin-right:16px;color:#111;white-space:nowrap}
.nav-btn{padding:13px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;font-family:'Sarabun',sans-serif;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:#111}
.nav-btn.active{color:#111;border-bottom-color:#111;font-weight:500}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.user-info{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.user-avatar{width:26px;height:26px;border-radius:50%;border:1px solid #ddd}
.btn-logout{padding:4px 10px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:11px;font-family:'Sarabun',sans-serif;color:#666}
.btn-logout:hover{background:#fde8e0;color:#6b1e08;border-color:#f0a080}
.status-dot{width:7px;height:7px;border-radius:50%;background:#4caf50;box-shadow:0 0 0 2px #c8e6c9;flex-shrink:0}
.realtime-badge{display:inline-block;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:20px;font-size:10px;padding:2px 8px;margin-left:6px;font-weight:600}

.content{max-width:1140px;margin:0 auto;padding:16px}
.page{display:none}.page.active{display:block}
.card{background:#fff;border:1px solid #e8e8e3;border-radius:10px;padding:16px;margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#555;font-weight:500}
.form-group input,.form-group select,.form-group textarea{padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#111;font-family:'Sarabun',sans-serif;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#888}
.form-group textarea{resize:vertical;min-height:80px;font-family:monospace;font-size:12px}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.type-btn{padding:11px;border:1px solid #ddd;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;background:#f9f9f7;color:#555;font-family:'Sarabun',sans-serif;transition:all .15s;font-weight:500}
.type-btn.in.active{background:#eaf3de;border-color:#7ab648;color:#2a5c0a}
.type-btn.out.active{background:#fde8e0;border-color:#d85a30;color:#6b1e08}
.btn{padding:9px 18px;border-radius:8px;border:1px solid #ddd;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;background:#fff;color:#111;transition:all .15s}
.btn:hover{background:#f5f5f3}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:#111;color:#fff;border-color:#111}
.btn-primary:hover:not(:disabled){background:#333}
.btn-danger{background:#fde8e0;border-color:#d85a30;color:#6b1e08}
.btn-excel{background:#1a6b35;color:#fff;border-color:#1a6b35}
.btn-excel:hover{background:#145228}
.btn-sm{padding:5px 10px;font-size:12px}
.row-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-in{background:#eaf3de;color:#2a5c0a}
.badge-out{background:#fde8e0;color:#6b1e08}
.badge-warn{background:#fff3cd;color:#7a5400}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:#fff;border:1px solid #e8e8e3;border-radius:9px;padding:14px}
.metric-label{font-size:11px;color:#888;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:600;color:#666;text-align:left;padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap;background:#fafaf8}
td{padding:7px 10px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.row-warn td{background:#fffbeb}
.mono{font-family:monospace;font-size:11px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.alert{padding:9px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alert-success{background:#eaf3de;color:#2a5c0a;border:1px solid #9fd15b}
.alert-error{background:#fde8e0;color:#6b1e08;border:1px solid #f0a080}
.alert-warn{background:#fff8e1;color:#7a5400;border:1px solid #ffc107}
.parsed-preview{background:#f7f7f5;border:1px solid #e5e5e0;border-radius:8px;padding:12px;margin-top:8px}
.parsed-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.parsed-row{display:flex;gap:6px;align-items:center;padding:3px 0}
.parsed-key{color:#888;min-width:105px;font-size:11px}
.parsed-val{font-family:monospace;font-size:12px;font-weight:500;color:#111}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;background:#fff;color:#111;font-family:'Sarabun',sans-serif;flex:1;min-width:130px}
.scan-count-label{font-size:12px;color:#888;margin-top:6px}
.dup-list{background:#fff5f3;border:1px solid #f0a080;border-radius:8px;padding:10px 14px;margin-top:8px}
.dup-list-title{font-size:12px;font-weight:600;color:#6b1e08;margin-bottom:6px}
.dup-item{font-size:11px;font-family:monospace;color:#6b1e08;padding:2px 0;border-bottom:1px solid #fcd4c4}
.dup-item:last-child{border-bottom:none}
.tbl-wrap{overflow-x:auto}
.low-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none}
.low-banner-title{font-size:12px;font-weight:600;color:#7a5400;margin-bottom:4px}
.low-banner-item{font-size:12px;color:#7a5400;padding:1px 0}
.min-stock-input{width:75px;padding:4px 6px;border:1px solid #ddd;border-radius:5px;font-size:12px;text-align:center;font-family:'Sarabun',sans-serif}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">📦</div>
    <div class="login-title">ระบบรับ-เบิกสินค้า</div>
    <div class="login-sub">กรุณา Login ด้วย Email บริษัทเท่านั้น</div>
    <div class="login-form">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="email@deltaww.com" autocomplete="username">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="รหัสผ่าน" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') signIn()">
    </div>
    <button class="btn-login" id="loginBtn" onclick="signIn()">เข้าสู่ระบบ</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP PAGE -->
<div id="appPage">
  <div class="topbar">
    <h1>📦 ระบบรับ-เบิกสินค้า <span class="realtime-badge">● REALTIME</span></h1>
    <button class="nav-btn active" onclick="showPage('scan',this)">สแกนรับ / เบิก</button>
    <button class="nav-btn" onclick="showPage('stock',this)">สต็อกรวม</button>
    <button class="nav-btn" onclick="showPage('daily',this)">สต็อกรายวัน</button>
    <button class="nav-btn" onclick="showPage('raw',this)">ข้อมูลดิบ</button>
    <div class="topbar-right">
      <div class="status-dot"></div>
      <div class="user-info">
        <img class="user-avatar" id="userAvatar" src="" alt="">
        <span id="userEmail"></span>
      </div>
      <button class="btn-logout" onclick="signOut()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="content">
    <div class="low-banner" id="lowBanner">
      <div class="low-banner-title">⚠️ สต็อกต่ำกว่าที่กำหนด</div>
      <div id="lowBannerList"></div>
    </div>

    <!-- SCAN -->
    <div id="page-scan" class="page active">
      <div class="card">
        <div class="form-row">
          <div class="form-group"><label>Work Order</label><input type="text" id="wo" placeholder="เช่น WO-2024-001"></div>
          <div class="form-group"><label>รุ่นสินค้า (Model)</label><input type="text" id="model" placeholder="เช่น MODEL-X100"></div>
        </div>
        <div class="form-group" style="margin-bottom:12px">
          <label>ประเภทรายการ</label>
          <div class="type-toggle" style="margin-top:4px">
            <button class="type-btn in active" onclick="setType('IN',this)">📥 รับเข้า (IN)</button>
            <button class="type-btn out" onclick="setType('OUT',this)">📤 เบิกออก (OUT)</button>
          </div>
        </div>
        <div class="form-group">
          <label>สแกนบาร์โค้ด (สแกนต่อเนื่องได้ — แต่ละรายการขึ้นบรรทัดใหม่อัตโนมัติ)</label>
          <textarea id="barcodeInput" placeholder="สแกนบาร์โค้ดที่นี่...&#10;รูปแบบ: 3673568000 {20 {PCE {726098 {2624 {02 {T5EA263072 {E-2602799 {256906116995"></textarea>
          <div class="scan-count-label" id="scanCount"></div>
        </div>
        <div id="parsePreview" style="display:none"></div>
        <div id="dupBox" style="display:none"></div>
        <div id="alertBox" style="display:none"></div>
        <div class="row-actions">
          <button class="btn" onclick="clearScan()">ล้างการสแกน</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">💾 บันทึก</button>
        </div>
      </div>
    </div>

    <!-- STOCK -->
    <div id="page-stock" class="page">
      <div class="metrics">
        <div class="metric"><div class="metric-label">Part ทั้งหมด</div><div class="metric-value" id="mParts">0</div></div>
        <div class="metric"><div class="metric-label">รับเข้ารวม</div><div class="metric-value" id="mIn" style="color:#3B6D11">0</div></div>
        <div class="metric"><div class="metric-label">เบิกออกรวม</div><div class="metric-value" id="mOut" style="color:#993C1D">0</div></div>
        <div class="metric"><div class="metric-label">แจ้งเตือนสต็อกต่ำ</div><div class="metric-value" id="mAlerts" style="color:#b45309">0</div></div>
      </div>
      <div class="filter-row">
        <input type="text" id="stockSearch" placeholder="ค้นหา Part / Model / WO..." oninput="renderStock()">
        <button class="btn btn-excel" onclick="exportExcel()">📊 Export Excel</button>
      </div>
      <div class="card"><div class="tbl-wrap" id="stockTable"><div class="empty">ยังไม่มีข้อมูล</div></div></div>
    </div>

    <!-- DAILY -->
    <div id="page-daily" class="page">
      <div class="filter-row">
        <input type="date" id="fDate" oninput="renderDaily()">
        <input type="text" id="fPart" placeholder="ค้นหา Part Number..." oninput="renderDaily()">
        <select id="fType" onchange="renderDaily()">
          <option value="">ทุกประเภท</option>
          <option value="IN">รับเข้า (IN)</option>
          <option value="OUT">เบิกออก (OUT)</option>
        </select>
      </div>
      <div class="card"><div class="tbl-wrap" id="dailyTable"><div class="empty">ยังไม่มีข้อมูล</div></div></div>
    </div>

    <!-- RAW -->
    <div id="page-raw" class="page">
      <div class="filter-row">
        <input type="text" id="rawSearch" placeholder="ค้นหา..." oninput="renderRaw()">
        <button class="btn btn-excel" onclick="exportExcel()">📊 Export Excel</button>
        <button class="btn btn-sm btn-danger" onclick="clearAll()">🗑 ล้างข้อมูลทั้งหมด</button>
      </div>
      <div class="card"><div class="tbl-wrap" id="rawTable"><div class="empty">ยังไม่มีข้อมูล</div></div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getDatabase, ref, onValue, set, remove, update }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

// ── Config ──────────────────────────────────────────────────────────
const ALLOWED_EMAILS = [
  'siryodke@deltaww.com',
  'Saowalak.C@deltaww.com',
  // เพิ่ม email ที่อนุญาตได้ที่นี่
];

const firebaseConfig = {
  apiKey: "AIzaSyB1XstesP0FlwXfXxyZRWSNNWGa73vxXDY",
  authDomain: "inventory-system-b2e85.firebaseapp.com",
  databaseURL: "https://inventory-system-b2e85-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "inventory-system-b2e85",
  storageBucket: "inventory-system-b2e85.firebasestorage.app",
  messagingSenderId: "505046436724",
  appId: "1:505046436724:web:fbbb67c6c687fe4ddc3a21"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ── State ───────────────────────────────────────────────────────────
let currentType = 'IN';
let records = {};
let settings = {};
let currentPage = 'scan';
let dbListeners = [];

// ── Auth ─────────────────────────────────────────────────────────────
window.signIn = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  if (!email) { showLoginError('กรุณากรอก Email'); return; }
  if (!password) { showLoginError('กรุณากรอก Password'); return; }
  if (!ALLOWED_EMAILS.map(e=>e.toLowerCase()).includes(email.toLowerCase())) {
    showLoginError(`❌ Email "${email}" ไม่ได้รับอนุญาต กรุณาติดต่อผู้ดูแลระบบ`);
    return;
  }
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    const msgs = {
      'auth/invalid-credential': '❌ Email หรือ Password ไม่ถูกต้อง',
      'auth/user-not-found': '❌ ไม่พบ Email นี้ในระบบ กรุณาติดต่อผู้ดูแล',
      'auth/wrong-password': '❌ Password ไม่ถูกต้อง',
      'auth/too-many-requests': '⚠️ ลองผิดหลายครั้งเกินไป กรุณารอสักครู่แล้วลองใหม่',
      'auth/user-disabled': '❌ บัญชีนี้ถูกระงับ กรุณาติดต่อผู้ดูแล',
    };
    showLoginError(msgs[e.code] || '❌ เกิดข้อผิดพลาด: ' + e.message);
  }
  btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
};

window.signOut = async () => {
  if (confirm('ยืนยันออกจากระบบ?')) await fbSignOut(auth);
};

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

onAuthStateChanged(auth, user => {
  if (user && ALLOWED_EMAILS.includes(user.email)) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appPage').style.display = 'block';
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('userAvatar').src = '';
    document.getElementById('loginError').style.display = 'none';
    startDBListeners();
  } else {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appPage').style.display = 'none';
    stopDBListeners();
  }
});

function startDBListeners() {
  const r1 = onValue(ref(db, 'records'), snap => {
    records = snap.val() || {};
    refreshAll();
  });
  const r2 = onValue(ref(db, 'settings'), snap => {
    settings = snap.val() || {};
    refreshAll();
  });
  dbListeners = [r1, r2];
}

function stopDBListeners() {
  dbListeners.forEach(unsub => unsub());
  dbListeners = [];
}

function refreshAll() {
  updateLowBanner();
  if (currentPage === 'stock') renderStock();
  if (currentPage === 'daily') renderDaily();
  if (currentPage === 'raw') renderRaw();
  realtimeDupCheck(getParsedFromInput());
}

// ── Navigation ───────────────────────────────────────────────────────
window.showPage = (name, btn) => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = name;
  if (name === 'stock') renderStock();
  if (name === 'daily') renderDaily();
  if (name === 'raw') renderRaw();
};

window.setType = (type, btn) => {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
};

// ── Barcode Parser ───────────────────────────────────────────────────
function parseBarcode(raw) {
  raw = raw.trim();
  const p = raw.split('{');
  if (p.length < 9) return null;
  return {
    rawCode: raw,
    partNumber: p[0].trim(), qty: parseInt(p[1]) || 0,
    unit: p[2].trim(), vendorCode: p[3].trim(),
    weekLot: p[4].trim(), subLot: p[5].trim(),
    serialBatch: p[6].trim(), internalRef: p[7].trim(), trackingPO: p[8].trim()
  };
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function isoNow() { return new Date().toISOString(); }
function fmtTime(d) { return d.toTimeString().slice(0, 5); }
function getDupKey(p) { return `${p.partNumber}||${p.trackingPO}`; }
function getParsedFromInput() {
  return bInput.value.split('\n').filter(l => l.trim()).map(l => parseBarcode(l)).filter(Boolean);
}

// ── Barcode Input ────────────────────────────────────────────────────
const bInput = document.getElementById('barcodeInput');
bInput.addEventListener('input', onBarcodeInput);
bInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    if (bInput.value && !bInput.value.endsWith('\n')) bInput.value += '\n';
    onBarcodeInput();
  }
});

function onBarcodeInput() {
  const items = getParsedFromInput();
  document.getElementById('scanCount').textContent = items.length ? `พบบาร์โค้ด: ${items.length} รายการ` : '';
  updatePreview();
  realtimeDupCheck(items);
}

function updatePreview() {
  const items = getParsedFromInput();
  const el = document.getElementById('parsePreview');
  if (!items.length) { el.style.display = 'none'; return; }
  const last = items[items.length - 1];
  el.style.display = 'block';
  el.innerHTML = `<div class="parsed-preview">
    <div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600">ข้อมูลที่แยกได้จากบาร์โค้ดล่าสุด:</div>
    <div class="parsed-grid">
      ${pr('Part Number',last.partNumber)}${pr('Qty / Unit',last.qty+' '+last.unit)}
      ${pr('Vendor Code',last.vendorCode)}${pr('Week / Sub-Lot',last.weekLot+' / '+last.subLot)}
      ${pr('Serial/Batch',last.serialBatch)}${pr('Internal Ref',last.internalRef)}
      ${pr('Tracking/PO',last.trackingPO)}
    </div></div>`;
}
function pr(k,v){return `<div class="parsed-row"><span class="parsed-key">${k}</span><span class="parsed-val">${v||'-'}</span></div>`;}

function realtimeDupCheck(items) {
  const storedKeys = new Set(Object.values(records).map(r => getDupKey(r)));
  const seenNow = new Set();
  const dupes = [];
  for (const p of items) {
    const k = getDupKey(p);
    if (storedKeys.has(k)) dupes.push({...p, reason:'เคยบันทึกไปแล้ว'});
    else if (seenNow.has(k)) dupes.push({...p, reason:'สแกนซ้ำในรอบเดียวกัน'});
    seenNow.add(k);
  }
  const el = document.getElementById('dupBox');
  if (!dupes.length) { el.style.display='none'; return; }
  el.style.display = 'block';
  el.innerHTML = `<div class="dup-list">
    <div class="dup-list-title">⛔ พบบาร์โค้ดซ้ำ ${dupes.length} รายการ — จะถูกบล็อก</div>
    ${dupes.map(d=>`<div class="dup-item">Part: ${d.partNumber} | Tracking/PO: ${d.trackingPO} — ${d.reason}</div>`).join('')}
  </div>`;
}

// ── Save Record ──────────────────────────────────────────────────────
window.saveRecord = async () => {
  const wo = document.getElementById('wo').value.trim();
  const mdl = document.getElementById('model').value.trim();
  if (!wo) { showAlert('กรุณากรอก Work Order','error'); return; }
  if (!mdl) { showAlert('กรุณากรอกรุ่นสินค้า','error'); return; }
  const items = getParsedFromInput();
  if (!items.length) { showAlert('ไม่พบบาร์โค้ดที่ถูกต้อง','error'); return; }

  const storedKeys = new Set(Object.values(records).map(r => getDupKey(r)));
  const seenNow = new Set();
  const blocked = [], allowed = [];
  for (const p of items) {
    const k = getDupKey(p);
    if (storedKeys.has(k)||seenNow.has(k)) { blocked.push(p); continue; }
    seenNow.add(k); allowed.push(p);
  }
  if (!allowed.length) { showAlert(`⛔ บล็อกทั้งหมด ${blocked.length} รายการ — พบบาร์โค้ดซ้ำ`,'error'); return; }

  document.getElementById('saveBtn').disabled = true;
  const today = todayStr(), timeNow = fmtTime(new Date());
  const user = auth.currentUser;

  const mergeMap = {};
  for (const p of allowed) {
    const mk = `${p.partNumber}||${today}||${currentType}||${wo}`;
    if (mergeMap[mk]) {
      mergeMap[mk].qty += p.qty;
      mergeMap[mk].rawCodes.push(p.rawCode);
      if (!mergeMap[mk].serialBatches.includes(p.serialBatch)) mergeMap[mk].serialBatches.push(p.serialBatch);
    } else {
      mergeMap[mk] = { ...p, wo, model: mdl, type: currentType, date: today, time: timeNow,
        savedAt: isoNow(), savedBy: user?.email || '',
        rawCodes: [p.rawCode], serialBatches: [p.serialBatch] };
    }
  }

  const recArr = Object.entries(records);
  const updates = {};
  for (const item of Object.values(mergeMap)) {
    const mk = `${item.partNumber}||${item.date}||${item.type}||${item.wo}`;
    const existing = recArr.find(([,r]) => `${r.partNumber}||${r.date}||${r.type}||${r.wo}` === mk);
    if (existing) {
      const [key, old] = existing;
      updates[`records/${key}/qty`] = (old.qty||0) + item.qty;
      updates[`records/${key}/rawCodes`] = [...(old.rawCodes||[]), ...item.rawCodes];
      const sbs = [...(old.serialBatches||[])];
      for (const sb of item.serialBatches) { if (!sbs.includes(sb)) sbs.push(sb); }
      updates[`records/${key}/serialBatches`] = sbs;
    } else {
      const newKey = 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
      updates[`records/${newKey}`] = item;
    }
  }

  try {
    await update(ref(db), updates);
    const lowAlerts = checkLowAfterSave(allowed.map(p => p.partNumber));
    if (lowAlerts.length) {
      showAlert('⚠️ สต็อกต่ำกว่ากำหนด: ' + lowAlerts.map(a=>`${a.part} เหลือ ${a.bal}`).join(', '),'warn');
    } else {
      const bMsg = blocked.length ? ` (บล็อก ${blocked.length} ซ้ำ)` : '';
      showAlert(`✅ บันทึกสำเร็จ ${allowed.length} รายการ${bMsg}`,'success');
    }
    clearScan();
  } catch(e) {
    showAlert('❌ บันทึกไม่สำเร็จ: ' + e.message,'error');
  }
  document.getElementById('saveBtn').disabled = false;
};

function checkLowAfterSave(partNumbers) {
  const stock = buildStock();
  return partNumbers.map(part => {
    const s = stock[part];
    const min = settings[part]?.minStock;
    if (s && min !== undefined && s.balance <= min) return {part, bal: s.balance, min};
    return null;
  }).filter(Boolean);
}

// ── Stock Builder ────────────────────────────────────────────────────
function buildStock() {
  const map = {};
  for (const r of Object.values(records)) {
    if (!map[r.partNumber]) map[r.partNumber] = {
      partNumber: r.partNumber, unit: r.unit||'', vendorCode: r.vendorCode||'',
      totalIn: 0, totalOut: 0, lastDate: '', woSet: new Set(), modelSet: new Set()
    };
    if (r.type==='IN') map[r.partNumber].totalIn += r.qty;
    else map[r.partNumber].totalOut += r.qty;
    if ((r.date||'') > map[r.partNumber].lastDate) map[r.partNumber].lastDate = r.date;
    if (r.wo) map[r.partNumber].woSet.add(r.wo);
    if (r.model) map[r.partNumber].modelSet.add(r.model);
  }
  const result = {};
  for (const [k,s] of Object.entries(map)) {
    const bal = s.totalIn - s.totalOut;
    const min = settings[k]?.minStock;
    result[k] = { ...s, balance: bal, wo: [...s.woSet].join(', '), model: [...s.modelSet].join(', '),
      minStock: min??null, lowAlert: min!==undefined && bal<=min };
  }
  return result;
}

function updateLowBanner() {
  const stock = buildStock();
  const lows = Object.values(stock).filter(s => s.lowAlert);
  const el = document.getElementById('lowBanner');
  if (!lows.length) { el.style.display='none'; return; }
  el.style.display = 'block';
  document.getElementById('lowBannerList').innerHTML = lows.map(s =>
    `<div class="low-banner-item">• ${s.partNumber} — คงเหลือ <strong>${s.balance}</strong> ${s.unit} (ขั้นต่ำ: ${s.minStock})</div>`).join('');
}

// ── Render Stock ─────────────────────────────────────────────────────
function renderStock() {
  const stock = buildStock();
  const search = (document.getElementById('stockSearch')?.value||'').toLowerCase();
  let rows = Object.values(stock).filter(r =>
    !search || r.partNumber.toLowerCase().includes(search) ||
    r.wo.toLowerCase().includes(search) || r.model.toLowerCase().includes(search));
  rows.sort((a,b) => b.lastDate.localeCompare(a.lastDate));
  document.getElementById('mParts').textContent = rows.length;
  document.getElementById('mIn').textContent = rows.reduce((s,r)=>s+r.totalIn,0).toLocaleString();
  document.getElementById('mOut').textContent = rows.reduce((s,r)=>s+r.totalOut,0).toLocaleString();
  document.getElementById('mAlerts').textContent = rows.filter(r=>r.lowAlert).length;
  const el = document.getElementById('stockTable');
  if (!rows.length) { el.innerHTML='<div class="empty">ยังไม่มีข้อมูล</div>'; return; }
  el.innerHTML = `<table><thead><tr>
    <th>Part Number</th><th>Vendor Code</th><th>Unit</th>
    <th style="text-align:right">รับเข้า</th><th style="text-align:right">เบิกออก</th>
    <th style="text-align:right">คงเหลือ</th><th>ขั้นต่ำ</th>
    <th>Work Order</th><th>Model</th><th>อัปเดตล่าสุด</th>
  </tr></thead><tbody>${rows.map(r=>`<tr class="${r.lowAlert?'row-warn':''}">
    <td class="mono" style="font-weight:600">${r.partNumber}${r.lowAlert?' <span class="badge badge-warn">⚠️</span>':''}</td>
    <td class="mono">${r.vendorCode}</td><td>${r.unit}</td>
    <td style="text-align:right;color:#3B6D11;font-weight:600">${r.totalIn.toLocaleString()}</td>
    <td style="text-align:right;color:#993C1D;font-weight:600">${r.totalOut.toLocaleString()}</td>
    <td style="text-align:right;font-weight:600;color:${r.balance<0?'#993C1D':r.balance===0?'#888':'#111'}">${r.balance.toLocaleString()}</td>
    <td><input class="min-stock-input" type="number" min="0" value="${r.minStock??''}" placeholder="-"
      onchange="saveMinStock('${r.partNumber}',this.value)"></td>
    <td style="font-size:11px">${r.wo}</td><td style="font-size:11px">${r.model}</td>
    <td style="font-size:11px">${r.lastDate}</td>
  </tr>`).join('')}</tbody></table>
  <div style="font-size:11px;color:#aaa;margin-top:8px">💡 ตั้งค่าขั้นต่ำในช่อง "ขั้นต่ำ" แล้วกด Enter</div>`;
}

window.saveMinStock = async (part, val) => {
  const min = val===''?null:parseInt(val);
  const s = {...settings};
  if (min===null) delete s[part]; else s[part]={minStock:min};
  await set(ref(db,'settings'), s);
};

// ── Render Daily ─────────────────────────────────────────────────────
function renderDaily() {
  const dateF = document.getElementById('fDate')?.value||'';
  const partF = (document.getElementById('fPart')?.value||'').toLowerCase();
  const typeF = document.getElementById('fType')?.value||'';
  let rows = Object.values(records).filter(r => {
    if (dateF && r.date!==dateF) return false;
    if (partF && !r.partNumber.toLowerCase().includes(partF)) return false;
    if (typeF && r.type!==typeF) return false;
    return true;
  }).sort((a,b)=>b.date.localeCompare(a.date)||b.time.localeCompare(a.time));
  const el = document.getElementById('dailyTable');
  if (!rows.length) { el.innerHTML='<div class="empty">ไม่พบข้อมูล</div>'; return; }
  el.innerHTML = `<table><thead><tr>
    <th>วันที่</th><th>เวลา</th><th>ประเภท</th><th>Part Number</th>
    <th>Qty</th><th>Unit</th><th>Serial/Batch</th><th>Vendor Code</th>

// ── Export Excel ──────────────────────────────────────────────────────
window.exportExcel = () => {
  const recArr = Object.values(records);
  if (!recArr.length) { alert('ยังไม่มีข้อมูล'); return; }
  const wb = XLSX.utils.book_new();
  const stock = buildStock();
  const cw = n => Array(n).fill({wch:18});

  const ws1 = XLSX.utils.json_to_sheet(Object.values(stock).map(r=>({
    'Part Number':r.partNumber,'Vendor Code':r.vendorCode,'Unit':r.unit,
    'รับเข้ารวม':r.totalIn,'เบิกออกรวม':r.totalOut,'คงเหลือ':r.balance,
    'ขั้นต่ำ':r.minStock??'','แจ้งเตือน':r.lowAlert?'⚠️ ต่ำกว่ากำหนด':'',
    'Work Order':r.wo,'Model':r.model,'อัปเดตล่าสุด':r.lastDate
  })));
  ws1['!cols']=cw(11); XLSX.utils.book_append_sheet(wb,ws1,'สต็อกรวม');

  const ws2 = XLSX.utils.json_to_sheet([...recArr].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>({
    'วันที่':r.date,'เวลา':r.time||'','ประเภท':r.type,
    'Part Number':r.partNumber,'Qty':r.qty,'Unit':r.unit||'',
    'Serial/Batch':(r.serialBatches||[r.serialBatch||'']).join(', '),
    'Vendor Code':r.vendorCode||'','Week/Lot':r.weekLot||'','Sub-Lot':r.subLot||'',
    'Internal Ref':r.internalRef||'','Tracking/PO':r.trackingPO||'',
    'Work Order':r.wo||'','Model':r.model||'','บันทึกโดย':r.savedBy||''
  })));
  ws2['!cols']=cw(15); XLSX.utils.book_append_sheet(wb,ws2,'รายวัน');

  const ws3 = XLSX.utils.json_to_sheet([...recArr].sort((a,b)=>(b.savedAt||'').localeCompare(a.savedAt||'')).map(r=>({
    'บันทึกเมื่อ':(r.savedAt||'').replace('T',' ').slice(0,16),'บันทึกโดย':r.savedBy||'','ประเภท':r.type,
    'Part Number':r.partNumber,'Qty':r.qty,'Unit':r.unit||'',
    'Vendor Code':r.vendorCode||'','Week/Lot':r.weekLot||'','Sub-Lot':r.subLot||'',
    'Serial/Batch':(r.serialBatches||[r.serialBatch||'']).join(', '),
    'Internal Ref':r.internalRef||'','Tracking/PO':r.trackingPO||'',
    'Work Order':r.wo||'','Model':r.model||'',
    'บาร์โค้ดดิบ':(r.rawCodes||[r.rawCode||'']).join(' | ')
  })));
  ws3['!cols']=cw(15); XLSX.utils.book_append_sheet(wb,ws3,'ข้อมูลดิบ');

  XLSX.writeFile(wb, `inventory_${todayStr()}.xlsx`);
};

window.clearScan = () => {
  bInput.value='';
  document.getElementById('parsePreview').style.display='none';
  document.getElementById('scanCount').textContent='';
  document.getElementById('dupBox').style.display='none';
};

function showAlert(msg,type) {
  const el=document.getElementById('alertBox');
  el.className='alert alert-'+type; el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none',5000);
}

};
