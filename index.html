<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบรับ-เบิกสินค้า</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid #e5e5e0;padding:0 20px;display:flex;align-items:center;flex-wrap:wrap}
.topbar h1{font-size:15px;font-weight:500;padding:13px 0;margin-right:16px;color:#111;white-space:nowrap}
.realtime-badge{display:inline-block;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:20px;font-size:10px;padding:2px 8px;margin-left:6px;font-weight:600}
.nav-btn{padding:13px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#666;border-bottom:2px solid transparent;font-family:'Sarabun',sans-serif;white-space:nowrap}
.nav-btn:hover{color:#111}
.nav-btn.active{color:#111;border-bottom-color:#111;font-weight:500}

/* LAYOUT */
.content{max-width:1140px;margin:0 auto;padding:16px}
.page{display:none}
.page.active{display:block}
.card{background:#fff;border:1px solid #e8e8e3;border-radius:10px;padding:16px;margin-bottom:14px}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:12px;color:#555;font-weight:500}
.form-group input,.form-group textarea{padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#111;font-family:'Sarabun',sans-serif;outline:none;transition:border .15s}
.form-group input:focus,.form-group textarea:focus{border-color:#888}
.form-group textarea{resize:vertical;min-height:80px;font-family:monospace;font-size:12px}

/* SCAN TABS */
.scan-tabs{display:flex;margin-bottom:14px;border-bottom:1px solid #eee}
.scan-tab{padding:8px 14px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-bottom:2px solid transparent;font-family:'Sarabun',sans-serif;margin-bottom:-1px}
.scan-tab.active{color:#111;border-bottom-color:#111;font-weight:500}
.scan-panel{display:none}
.scan-panel.active{display:block}

/* TYPE TOGGLE */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.type-btn{padding:11px;border:1px solid #ddd;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;background:#f9f9f7;color:#555;font-family:'Sarabun',sans-serif;font-weight:500}
.type-btn.in.active{background:#eaf3de;border-color:#7ab648;color:#2a5c0a}
.type-btn.out.active{background:#fde8e0;border-color:#d85a30;color:#6b1e08}

/* BUTTONS */
.row-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.btn{padding:8px 16px;border:1px solid #ddd;border-radius:7px;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif;background:#fff;color:#555}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#111;color:#fff;border-color:#111}
.btn-primary:hover{background:#333}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-excel{background:#217346;color:#fff;border-color:#217346;padding:8px 16px;border-radius:7px;cursor:pointer;font-size:13px;font-family:'Sarabun',sans-serif}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:600;color:#666;text-align:left;padding:7px 10px;border-bottom:1px solid #eee;white-space:nowrap;background:#fafaf8}
td{padding:7px 10px;border-bottom:1px solid #f0f0ee;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
tr.row-warn td{background:#fffbeb}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.mono{font-family:monospace;font-size:11px}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600}
.badge-in{background:#eaf3de;color:#2a5c0a}
.badge-out{background:#fde8e0;color:#6b1e08}
.manual-badge{background:#fff3cd;color:#7a5400;border:1px solid #ffc107;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:4px}

/* MISC */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;background:#fff;color:#111;font-family:'Sarabun',sans-serif;flex:1;min-width:130px}
.scan-count-label{font-size:12px;color:#888;margin-top:6px}
.alert{padding:9px 14px;border-radius:8px;font-size:13px;margin-bottom:10px}
.alert-success{background:#eaf3de;color:#2a5c0a;border:1px solid #9fd15b}
.alert-error{background:#fde8e0;color:#6b1e08;border:1px solid #f0a080}
.dup-list{background:#fff5f3;border:1px solid #f0a080;border-radius:8px;padding:10px 14px;margin-top:8px}
.dup-title{font-size:12px;font-weight:600;color:#6b1e08;margin-bottom:6px}
.dup-item{font-size:11px;font-family:monospace;color:#6b1e08;padding:2px 0;border-bottom:1px solid #fcd4c4}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.metric{background:#fff;border:1px solid #e8e8e3;border-radius:9px;padding:14px}
.metric-label{font-size:11px;color:#888;margin-bottom:6px}
.metric-value{font-size:24px;font-weight:500}
.min-stock-input{width:60px;padding:4px 6px;border:1px solid #ddd;border-radius:5px;font-size:11px;text-align:center}
.parsed-preview{background:#f7f7f5;border:1px solid #e5e5e0;border-radius:8px;padding:12px;margin-top:8px}
.parsed-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.parsed-row{display:flex;gap:6px;align-items:center;padding:3px 0}
.parsed-key{color:#888;min-width:105px;font-size:11px}
.parsed-val{font-family:monospace;font-size:12px;font-weight:500;color:#111}
.low-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:12px;display:none}
.low-banner-title{font-size:12px;font-weight:600;color:#7a5400;margin-bottom:4px}
.low-banner-item{font-size:12px;color:#7a5400}

/* LOGIN PAGE */
#loginPage{display:none;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f3}
#loginPage.show{display:flex}
.login-card{background:#fff;border:1px solid #e8e8e3;border-radius:14px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:36px;margin-bottom:12px}
.login-title{font-size:18px;font-weight:500;color:#111;margin-bottom:4px}
.login-sub{font-size:13px;color:#888;margin-bottom:24px}
.login-form{text-align:left;margin-bottom:16px}
.login-form label{font-size:12px;color:#555;font-weight:500;display:block;margin-bottom:4px}
.login-form input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:'Sarabun',sans-serif;outline:none;margin-bottom:12px}
.btn-login{width:100%;padding:11px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-error{background:#fde8e0;color:#6b1e08;border:1px solid #f0a080;border-radius:7px;padding:9px 12px;font-size:12px;margin-top:14px;display:none;text-align:left}
#appPage{display:none}
#appPage.show{display:block}

</style>
</head>
<body>


<!-- LOGIN PAGE -->
<div id="loginPage" class="show">
  <div class="login-card">
    <div class="login-logo">📦</div>
    <div class="login-title">ระบบรับ-เบิกสินค้า</div>
    <div class="login-sub">Delta Electronics Thailand</div>
    <div class="login-form">
      <label>อีเมล</label>
      <input type="email" id="loginEmail" placeholder="example@deltaww.com">
      <label>รหัสผ่าน</label>
      <input type="password" id="loginPass" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div id="appPage">
<div class="topbar">
  <h1>📦 ระบบรับ-เบิกสินค้า <span class="realtime-badge">● REALTIME</span></h1>
  <button class="nav-btn active" onclick="showPage('scan',this)">สแกนรับ / เบิก</button>
  <button class="nav-btn" onclick="showPage('stock',this)">สต็อกรวม</button>
  <button class="nav-btn" onclick="showPage('daily',this)">สต็อกรายวัน</button>
  <button class="nav-btn" onclick="showPage('raw',this)">ข้อมูลดิบ</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px;padding:0 4px">
    <span id="userEmailSpan" style="font-size:11px;color:#888"></span>
    <button class="btn" style="font-size:11px;padding:4px 10px" onclick="doLogout()">ออกจากระบบ</button>
  </div>
</div>

<div class="content">

  <!-- LOW STOCK BANNER -->
  <div class="low-banner" id="lowBanner">
    <div class="low-banner-title">⚠️ สต็อกต่ำกว่าที่กำหนด</div>
    <div id="lowBannerList"></div>
  </div>

  <!-- SCAN PAGE -->
  <div id="page-scan" class="page active">
    <div class="card">
      <div class="scan-tabs">
        <button class="scan-tab active" onclick="switchTab('barcode',this)">📷 สแกนบาร์โค้ด</button>
        <button class="scan-tab" onclick="switchTab('manual',this)">✏️ กรอกมือ <span class="manual-badge">กล่องเสีย</span></button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Work Order</label>
          <input type="text" id="wo" placeholder="เช่น WO-2024-001">
        </div>
        <div class="form-group">
          <label>รุ่นสินค้า (Model)</label>
          <input type="text" id="model" placeholder="เช่น MODEL-X100">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ชื่อผู้บันทึก <span style="color:#e53e3e">*</span></label>
          <input type="text" id="personName" placeholder="พิมพ์ชื่อผู้บันทึก">
        </div>
        <div class="form-group">
          <label>โรงงาน <span style="color:#e53e3e">*</span></label>
          <input type="text" id="factory" placeholder="เช่น Line 1, โรงงาน A">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>ประเภทรายการ</label>
        <div class="type-toggle">
          <button class="type-btn in active" onclick="setType('IN',this)">📥 รับเข้า (IN)</button>
          <button class="type-btn out" onclick="setType('OUT',this)">📤 เบิกออก (OUT)</button>
        </div>
      </div>

      <!-- BARCODE PANEL -->
      <div id="panel-barcode" class="scan-panel active">
        <div class="form-group">
          <label>สแกนบาร์โค้ด (สแกนต่อเนื่องได้ — Enter ขึ้นบรรทัดใหม่อัตโนมัติ)</label>
          <textarea id="barcodeInput" placeholder="สแกนบาร์โค้ดที่นี่...&#10;รูปแบบ: 3673568000 {20 {PCE {726098 {2624 {02 {T5EA263072 {E-2602799 {256906116995"></textarea>
          <div class="scan-count-label" id="scanCount"></div>
        </div>
        <div id="parsePreview" style="display:none"></div>
        <div id="dupBox" style="display:none"></div>
      </div>

      <!-- MANUAL PANEL -->
      <div id="panel-manual" class="scan-panel">
        <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#7a5400">
          ⚠️ ใช้เมื่อสแกนบาร์โค้ดไม่ได้เท่านั้น
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Part Number <span style="color:#e53e3e">*</span></label>
            <input type="text" id="manualPart" placeholder="เช่น 3673568000">
          </div>
          <div class="form-group">
            <label>จำนวน (Qty) <span style="color:#e53e3e">*</span></label>
            <input type="number" id="manualQty" placeholder="เช่น 20" min="1">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Unit</label>
            <input type="text" id="manualUnit" placeholder="เช่น PCE">
          </div>
          <div class="form-group">
            <label>หมายเหตุ</label>
            <input type="text" id="manualNote" placeholder="เช่น บาร์โค้ดขาด">
          </div>
        </div>
      </div>

      <div id="alertBox" style="display:none"></div>
      <div class="row-actions">
        <button class="btn" onclick="clearScan()">ล้างข้อมูล</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveRecord()">💾 บันทึก</button>
      </div>
    </div>
  </div>

  <!-- STOCK PAGE -->
  <div id="page-stock" class="page">
    <div class="metrics">
      <div class="metric"><div class="metric-label">Part ทั้งหมด</div><div class="metric-value" id="mParts">0</div></div>
      <div class="metric"><div class="metric-label">รับเข้ารวม</div><div class="metric-value" id="mIn" style="color:#3B6D11">0</div></div>
      <div class="metric"><div class="metric-label">เบิกออกรวม</div><div class="metric-value" id="mOut" style="color:#993C1D">0</div></div>
      <div class="metric"><div class="metric-label">แจ้งเตือนสต็อกต่ำ</div><div class="metric-value" id="mAlerts" style="color:#b45309">0</div></div>
    </div>
    <div class="filter-row">
      <input type="text" id="stockSearch" placeholder="ค้นหา Part / Model / โรงงาน..." oninput="renderStock()">
      <button class="btn-excel" onclick="exportExcel()">📊 Export Excel</button>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="stockTable"><div class="empty">ยังไม่มีข้อมูล</div></div>
    </div>
  </div>

  <!-- DAILY PAGE -->
  <div id="page-daily" class="page">
    <div class="filter-row">
      <input type="date" id="fDate" oninput="renderDaily()">
      <input type="text" id="fPart" placeholder="ค้นหา Part..." oninput="renderDaily()">
      <select id="fType" onchange="renderDaily()">
        <option value="">ทุกประเภท</option>
        <option value="IN">รับเข้า (IN)</option>
        <option value="OUT">เบิกออก (OUT)</option>
      </select>
      <input type="text" id="fFactory" placeholder="ค้นหาโรงงาน..." oninput="renderDaily()">
      <button class="btn-excel" onclick="exportExcel()">📊 Export Excel</button>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="dailyTable"><div class="empty">ยังไม่มีข้อมูล</div></div>
    </div>
  </div>

  <!-- RAW PAGE -->
  <div id="page-raw" class="page">
    <div class="filter-row">
      <input type="text" id="rawSearch" placeholder="ค้นหา..." oninput="renderRaw()">
      <button class="btn-excel" onclick="exportExcel()">📊 Export Excel</button>
    </div>
    <div class="card">
      <div class="tbl-wrap" id="rawTable"><div class="empty">ยังไม่มีข้อมูล</div></div>
    </div>
  </div>

</div><!-- /content -->

</div><!-- /appPage -->

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ── Firebase Config ───────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyB1XstesP0FlwXfXxyZRWSNNWGa73vxXDY",
  authDomain: "inventory-system-b2e85.firebaseapp.com",
  databaseURL: "https://inventory-system-b2e85-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "inventory-system-b2e85",
  storageBucket: "inventory-system-b2e85.appspot.com",
  messagingSenderId: "1092407455778",
  appId: "1:1092407455778:web:inventory"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const ALLOWED = ['siryodke@deltaww.com','saowalak.c@deltaww.com','napawann@deltaww.com'];

// ── State ─────────────────────────────────────────────────────────────
let currentType = 'IN';
let records = {};
let settings = {};
let currentPage = 'scan';

// ── Start on load ─────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginPage').classList.remove('show');
    document.getElementById('appPage').classList.add('show');
    document.getElementById('userEmailSpan').textContent = user.email;
    db.ref('records').on('value', function(snap) { records = snap.val()||{}; refreshAll(); });
    db.ref('settings').on('value', function(snap) { settings = snap.val()||{}; refreshAll(); });
  } else {
    document.getElementById('loginPage').classList.add('show');
    document.getElementById('appPage').classList.remove('show');
  }
});

// ── Navigation ────────────────────────────────────────────────────────

function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass  = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginError');
  var btn   = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!ALLOWED.includes(email)) { errEl.textContent='อีเมลนี้ไม่ได้รับอนุญาต'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e){
      errEl.textContent='อีเมลหรือรหัสผ่านไม่ถูกต้อง'; errEl.style.display='block';
      btn.disabled=false; btn.textContent='เข้าสู่ระบบ';
    });
}

function doLogout() {
  if (!confirm('ยืนยันออกจากระบบ?')) return;
  db.ref('records').off(); db.ref('settings').off();
  auth.signOut();
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  currentPage = name;
  if (name === 'stock') renderStock();
  if (name === 'daily') renderDaily();
  if (name === 'raw') renderRaw();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.scan-tab').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.scan-panel').forEach(function(p){ p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  window._tab = tab;
}
window._tab = 'barcode';

function setType(type, btn) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
}

// ── Refresh ────────────────────────────────────────────────────────────
function refreshAll() {
  updateLowBanner();
  if (currentPage === 'stock') renderStock();
  if (currentPage === 'daily') renderDaily();
  if (currentPage === 'raw') renderRaw();
  dupCheck(getParsed());
}

// ── Helpers ────────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().split('T')[0]; }
function isoNow()   { return new Date().toISOString(); }
function fmtTime(d) { return d.toTimeString().slice(0,5); }
function dupKey(p, type) { return (p.partNumber||'') + '||' + (p.trackingPO||'') + '||' + (type||''); }

function parseBarcode(raw) {
  raw = raw.trim();
  var p = raw.split('{');
  if (p.length < 9) return null;
  return {
    rawCode: raw,
    partNumber: p[0].trim(), qty: parseInt(p[1]) || 0,
    unit: p[2].trim(), vendorCode: p[3].trim(),
    weekLot: p[4].trim(), subLot: p[5].trim(),
    serialBatch: p[6].trim(), internalRef: p[7].trim(), trackingPO: p[8].trim()
  };
}

function getParsed() {
  return document.getElementById('barcodeInput').value
    .split('\n').filter(function(l){ return l.trim(); })
    .map(parseBarcode).filter(Boolean);
}

// ── Barcode input events ───────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  var bi = document.getElementById('barcodeInput');
  bi.addEventListener('input', function() { onScanInput(); });
  bi.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      if (!bi.value.endsWith('\n')) bi.value += '\n';
      onScanInput();
    }
  });
});

function onScanInput() {
  var items = getParsed();
  document.getElementById('scanCount').textContent = items.length ? 'พบบาร์โค้ด: ' + items.length + ' รายการ' : '';
  showPreview(items);
  dupCheck(items);
}

function showPreview(items) {
  var el = document.getElementById('parsePreview');
  if (!items.length) { el.style.display='none'; return; }
  var last = items[items.length-1];
  el.style.display = 'block';
  el.innerHTML = '<div class="parsed-preview">' +
    '<div style="font-size:11px;color:#888;margin-bottom:8px;font-weight:600">ข้อมูลบาร์โค้ดล่าสุด:</div>' +
    '<div class="parsed-grid">' +
      pr('Part Number', last.partNumber) + pr('Qty / Unit', last.qty+' '+last.unit) +
      pr('Vendor Code', last.vendorCode) + pr('Week/Sub-Lot', last.weekLot+'/'+last.subLot) +
      pr('Serial/Batch', last.serialBatch) + pr('Tracking/PO', last.trackingPO) +
    '</div></div>';
}
function pr(k,v){ return '<div class="parsed-row"><span class="parsed-key">'+k+'</span><span class="parsed-val">'+(v||'-')+'</span></div>'; }

function dupCheck(items) {
  var stored = {};
  Object.values(records).forEach(function(r){ stored[dupKey(r,r.type)] = true; });
  var seen = {};
  var dupes = [];
  items.forEach(function(p) {
    var k = dupKey(p, currentType);
    if (stored[k]) dupes.push(p.partNumber + ' | ' + p.trackingPO + ' — เคยบันทึกแล้ว');
    else if (seen[k]) dupes.push(p.partNumber + ' | ' + p.trackingPO + ' — สแกนซ้ำในรอบนี้');
    seen[k] = true;
  });
  var el = document.getElementById('dupBox');
  if (!dupes.length) { el.style.display='none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div class="dup-list"><div class="dup-title">⛔ พบบาร์โค้ดซ้ำ ' + dupes.length + ' รายการ — จะถูกบล็อก</div>' +
    dupes.map(function(d){ return '<div class="dup-item">'+d+'</div>'; }).join('') + '</div>';
}

// ── Save Record ────────────────────────────────────────────────────────
function saveRecord() {
  var wo      = document.getElementById('wo').value.trim();
  var mdl     = document.getElementById('model').value.trim();
  var person  = document.getElementById('personName').value.trim();
  var factory = document.getElementById('factory').value.trim();
  if (!wo)      { showAlert('กรุณากรอก Work Order','error'); return; }
  if (!mdl)     { showAlert('กรุณากรอกรุ่นสินค้า (Model)','error'); return; }
  if (!person)  { showAlert('กรุณากรอกชื่อผู้บันทึก','error'); return; }
  if (!factory) { showAlert('กรุณากรอกโรงงาน','error'); return; }

  // Manual entry
  if (window._tab === 'manual') {
    var part = document.getElementById('manualPart').value.trim();
    var qty  = parseInt(document.getElementById('manualQty').value);
    var unit = document.getElementById('manualUnit').value.trim() || 'PCE';
    var note = document.getElementById('manualNote').value.trim();
    if (!part) { showAlert('กรุณากรอก Part Number','error'); return; }
    if (!qty || qty < 1) { showAlert('กรุณากรอกจำนวนที่ถูกต้อง','error'); return; }
    var key = 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
    db.ref('records/' + key).set({
      partNumber: part, qty: qty, unit: unit, type: currentType,
      wo: wo, model: mdl, person: person, factory: factory,
      date: todayStr(), time: fmtTime(new Date()), savedAt: isoNow(),
      vendorCode:'', weekLot:'', subLot:'', serialBatch:'', internalRef:'', trackingPO:'',
      rawCodes: ['MANUAL|'+part+'|'+qty+'|'+unit], serialBatches: [],
      note: note || 'กรอกมือ', isManual: true
    }).then(function() {
      showAlert('✅ บันทึกมือสำเร็จ — ' + part + ' จำนวน ' + qty + ' ' + unit, 'success');
      clearScan();
    }).catch(function(e){ showAlert('❌ บันทึกไม่สำเร็จ: ' + e.message,'error'); });
    return;
  }

  // Barcode scan
  var items = getParsed();
  if (!items.length) { showAlert('ไม่พบบาร์โค้ดที่ถูกต้อง','error'); return; }

  var stored = {};
  Object.values(records).forEach(function(r){ stored[dupKey(r,r.type)] = true; });
  var seen = {};
  var allowed = [];
  var blocked = 0;
  items.forEach(function(p) {
    var k = dupKey(p, currentType);
    if (stored[k] || seen[k]) { blocked++; return; }
    seen[k] = true;
    allowed.push(p);
  });
  if (!allowed.length) { showAlert('⛔ บล็อกทั้งหมด ' + blocked + ' รายการ — พบบาร์โค้ดซ้ำ','error'); return; }

  var today = todayStr();
  var timeNow = fmtTime(new Date());

  // Merge same part+date+type+wo
  var mergeMap = {};
  allowed.forEach(function(p) {
    var mk = p.partNumber + '||' + today + '||' + currentType + '||' + wo;
    if (mergeMap[mk]) {
      mergeMap[mk].qty += p.qty;
      mergeMap[mk].rawCodes.push(p.rawCode);
      if (mergeMap[mk].serialBatches.indexOf(p.serialBatch) < 0) mergeMap[mk].serialBatches.push(p.serialBatch);
    } else {
      mergeMap[mk] = Object.assign({}, p, {
        wo: wo, model: mdl, person: person, factory: factory,
        type: currentType, date: today, time: timeNow, savedAt: isoNow(),
        rawCodes: [p.rawCode], serialBatches: [p.serialBatch]
      });
    }
  });

  var updates = {};
  var recArr = Object.entries(records);
  Object.values(mergeMap).forEach(function(item) {
    var mk = item.partNumber + '||' + item.date + '||' + item.type + '||' + item.wo;
    var existing = null;
    for (var i = 0; i < recArr.length; i++) {
      var r = recArr[i][1];
      if ((r.partNumber+'||'+r.date+'||'+r.type+'||'+r.wo) === mk) { existing = recArr[i]; break; }
    }
    if (existing) {
      var k = existing[0], old = existing[1];
      var sbs = (old.serialBatches||[]).slice();
      item.serialBatches.forEach(function(sb){ if (sbs.indexOf(sb)<0) sbs.push(sb); });
      updates['records/' + k + '/qty'] = (old.qty||0) + item.qty;
      updates['records/' + k + '/rawCodes'] = (old.rawCodes||[]).concat(item.rawCodes);
      updates['records/' + k + '/serialBatches'] = sbs;
    } else {
      var newKey = 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
      updates['records/' + newKey] = item;
    }
  });

  document.getElementById('saveBtn').disabled = true;
  db.ref().update(updates).then(function() {
    var msg = '✅ บันทึกสำเร็จ ' + allowed.length + ' รายการ';
    if (blocked) msg += ' (บล็อก ' + blocked + ' ซ้ำ)';
    showAlert(msg, 'success');
    clearScan();
    document.getElementById('saveBtn').disabled = false;
  }).catch(function(e) {
    showAlert('❌ บันทึกไม่สำเร็จ: ' + e.message,'error');
    document.getElementById('saveBtn').disabled = false;
  });
}

// ── Build Stock ────────────────────────────────────────────────────────
function buildStock() {
  var map = {};
  Object.values(records).forEach(function(r) {
    if (!r.partNumber) return;
    if (!map[r.partNumber]) map[r.partNumber] = {
      partNumber: r.partNumber, unit: r.unit||'', vendorCode: r.vendorCode||'',
      totalIn: 0, totalOut: 0, lastDate: '', wos: [], models: [], factories: []
    };
    var s = map[r.partNumber];
    if (r.type==='IN') s.totalIn += r.qty; else s.totalOut += r.qty;
    if ((r.date||'') > s.lastDate) s.lastDate = r.date;
    if (r.wo && s.wos.indexOf(r.wo)<0) s.wos.push(r.wo);
    if (r.model && s.models.indexOf(r.model)<0) s.models.push(r.model);
    if (r.factory && s.factories.indexOf(r.factory)<0) s.factories.push(r.factory);
  });
  var result = {};
  Object.entries(map).forEach(function(e) {
    var k = e[0], s = e[1];
    var bal = s.totalIn - s.totalOut;
    var min = settings[k] ? settings[k].minStock : undefined;
    result[k] = Object.assign({}, s, {
      balance: bal, wo: s.wos.join(', '), model: s.models.join(', '), factory: s.factories.join(', '),
      minStock: min != null ? min : null, lowAlert: min !== undefined && bal <= min
    });
  });
  return result;
}

function updateLowBanner() {
  var stock = buildStock();
  var lows = Object.values(stock).filter(function(s){ return s.lowAlert; });
  var el = document.getElementById('lowBanner');
  if (!lows.length) { el.style.display='none'; return; }
  el.style.display = 'block';
  document.getElementById('lowBannerList').innerHTML = lows.map(function(s){
    return '<div class="low-banner-item">• ' + s.partNumber + ' — คงเหลือ <strong>' + s.balance + '</strong> (ขั้นต่ำ: ' + s.minStock + ')</div>';
  }).join('');
}

// ── Render Stock ───────────────────────────────────────────────────────
function renderStock() {
  var stock = buildStock();
  var search = (document.getElementById('stockSearch').value||'').toLowerCase();
  var rows = Object.values(stock).filter(function(r){
    return !search || r.partNumber.toLowerCase().includes(search) ||
      r.model.toLowerCase().includes(search) || r.factory.toLowerCase().includes(search) ||
      r.wo.toLowerCase().includes(search);
  });
  rows.sort(function(a,b){ return b.lastDate.localeCompare(a.lastDate); });
  document.getElementById('mParts').textContent = rows.length;
  document.getElementById('mIn').textContent = rows.reduce(function(s,r){return s+r.totalIn;},0).toLocaleString();
  document.getElementById('mOut').textContent = rows.reduce(function(s,r){return s+r.totalOut;},0).toLocaleString();
  document.getElementById('mAlerts').textContent = rows.filter(function(r){return r.lowAlert;}).length;
  var el = document.getElementById('stockTable');
  if (!rows.length) { el.innerHTML='<div class="empty">ยังไม่มีข้อมูล</div>'; return; }
  el.innerHTML = '<table><thead><tr>' +
    '<th>Part Number</th><th>Vendor Code</th><th>Unit</th>' +
    '<th style="text-align:right">รับเข้า</th><th style="text-align:right">เบิกออก</th>' +
    '<th style="text-align:right">คงเหลือ</th><th>ขั้นต่ำ</th>' +
    '<th>โรงงาน</th><th>Work Order</th><th>Model</th><th>อัปเดตล่าสุด</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(r){
      var balColor = r.balance < 0 ? '#993C1D' : r.balance === 0 ? '#888' : '#111';
      return '<tr class="'+(r.lowAlert?'row-warn':'')+'">' +
        '<td class="mono" style="font-weight:600">' + r.partNumber + (r.lowAlert?' <span class="badge" style="background:#fff3cd;color:#7a5400">⚠️</span>':'') + '</td>' +
        '<td class="mono">' + r.vendorCode + '</td>' +
        '<td>' + r.unit + '</td>' +
        '<td style="text-align:right;color:#3B6D11;font-weight:600">' + r.totalIn.toLocaleString() + '</td>' +
        '<td style="text-align:right;color:#993C1D;font-weight:600">' + r.totalOut.toLocaleString() + '</td>' +
        '<td style="text-align:right;font-weight:600;color:'+balColor+'">' + r.balance.toLocaleString() + '</td>' +
        '<td><input class="min-stock-input" type="number" min="0" value="'+(r.minStock!=null?r.minStock:'')+'" placeholder="-" onchange="saveMinStock(\''+r.partNumber+'\',this.value)"></td>' +
        '<td style="font-size:11px">' + r.factory + '</td>' +
        '<td style="font-size:11px">' + r.wo + '</td>' +
        '<td style="font-size:11px">' + r.model + '</td>' +
        '<td style="font-size:11px">' + r.lastDate + '</td>' +
        '</tr>';
    }).join('') +
    '</tbody></table>' +
    '<div style="font-size:11px;color:#aaa;margin-top:8px">💡 ตั้งค่าขั้นต่ำในช่อง "ขั้นต่ำ" แล้วกด Enter</div>';
}

function saveMinStock(part, val) {
  var min = val === '' ? null : parseInt(val);
  var s = JSON.parse(JSON.stringify(settings));
  if (min === null) delete s[part]; else s[part] = { minStock: min };
  db.ref('settings').set(s);
}

// ── Render Daily ───────────────────────────────────────────────────────
function renderDaily() {
  var dateF    = document.getElementById('fDate').value || '';
  var partF    = (document.getElementById('fPart').value || '').toLowerCase();
  var typeF    = document.getElementById('fType').value || '';
  var factoryF = (document.getElementById('fFactory').value || '').toLowerCase();
  var rows = Object.values(records).filter(function(r){
    if (dateF && r.date !== dateF) return false;
    if (partF && !(r.partNumber||'').toLowerCase().includes(partF)) return false;
    if (typeF && r.type !== typeF) return false;
    if (factoryF && !(r.factory||'').toLowerCase().includes(factoryF)) return false;
    return true;
  }).sort(function(a,b){ return b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||''); });
  var el = document.getElementById('dailyTable');
  if (!rows.length) { el.innerHTML='<div class="empty">ไม่พบข้อมูล</div>'; return; }
  el.innerHTML = '<table><thead><tr>' +
    '<th>วันที่</th><th>เวลา</th><th>ประเภท</th><th>Part Number</th>' +
    '<th>Qty</th><th>Unit</th><th>ชื่อผู้บันทึก</th><th>โรงงาน</th>' +
    '<th>Serial/Batch</th><th>Vendor Code</th><th>Week/Lot</th>' +
    '<th>Tracking/PO</th><th>Work Order</th><th>Model</th>' +
    '</tr></thead><tbody>' +
    rows.map(function(r){
      var sbs = r.isManual ? (r.note||'กรอกมือ') : (r.serialBatches||[r.serialBatch||'']).join(', ');
      return '<tr>' +
        '<td>' + (r.date||'') + '</td>' +
        '<td>' + (r.time||'') + '</td>' +
        '<td><span class="badge ' + (r.type==='IN'?'badge-in':'badge-out') + '">' + r.type + '</span>' + (r.isManual?' <span class="manual-badge">กรอกมือ</span>':'') + '</td>' +
        '<td class="mono" style="font-weight:600">' + (r.partNumber||'') + '</td>' +
        '<td style="font-weight:600">' + (r.qty||0).toLocaleString() + '</td>' +
        '<td>' + (r.unit||'') + '</td>' +
        '<td style="font-weight:600">' + (r.person||'') + '</td>' +
        '<td>' + (r.factory||'') + '</td>' +
        '<td class="mono">' + sbs + '</td>' +
        '<td class="mono">' + (r.vendorCode||'') + '</td>' +
        '<td class="mono">' + (r.weekLot||'') + '</td>' +
        '<td class="mono">' + (r.trackingPO||'') + '</td>' +
        '<td style="font-size:11px">' + (r.wo||'') + '</td>' +
        '<td style="font-size:11px">' + (r.model||'') + '</td>' +
        '</tr>';
    }).join('') + '</tbody></table>';
}

// ── Export Excel ───────────────────────────────────────────────────────
function exportExcel() {
  var recArr = Object.values(records);
  if (!recArr.length) { alert('ยังไม่มีข้อมูล'); return; }
  var wb = XLSX.utils.book_new();
  var cw = function(n){ return Array(n).fill({wch:18}); };
  var stock = buildStock();

  var ws1 = XLSX.utils.json_to_sheet(Object.values(stock).map(function(r){ return {
    'Part Number':r.partNumber, 'Vendor Code':r.vendorCode, 'Unit':r.unit,
    'รับเข้ารวม':r.totalIn, 'เบิกออกรวม':r.totalOut, 'คงเหลือ':r.balance,
    'ขั้นต่ำ':r.minStock!=null?r.minStock:'', 'แจ้งเตือน':r.lowAlert?'⚠️ ต่ำกว่ากำหนด':'',
    'โรงงาน':r.factory, 'Work Order':r.wo, 'Model':r.model, 'อัปเดตล่าสุด':r.lastDate
  };}));
  ws1['!cols']=cw(12); XLSX.utils.book_append_sheet(wb,ws1,'สต็อกรวม');

  var ws2 = XLSX.utils.json_to_sheet(recArr.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).map(function(r){ return {
    'วันที่':r.date||'', 'เวลา':r.time||'', 'ประเภท':r.type,
    'Part Number':r.partNumber, 'Qty':r.qty, 'Unit':r.unit||'',
    'ชื่อผู้บันทึก':r.person||'', 'โรงงาน':r.factory||'',
    'Serial/Batch':(r.serialBatches||[r.serialBatch||'']).join(', '),
    'Vendor Code':r.vendorCode||'', 'Week/Lot':r.weekLot||'',
    'Tracking/PO':r.trackingPO||'', 'Work Order':r.wo||'', 'Model':r.model||''
  };}));
  ws2['!cols']=cw(14); XLSX.utils.book_append_sheet(wb,ws2,'รายวัน');

  XLSX.writeFile(wb, 'inventory_' + todayStr() + '.xlsx');
}

// ── Utility ────────────────────────────────────────────────────────────
function clearScan() {
  document.getElementById('wo').value = '';
  document.getElementById('model').value = '';
  document.getElementById('personName').value = '';
  document.getElementById('factory').value = '';
  document.getElementById('barcodeInput').value = '';
  document.getElementById('parsePreview').style.display = 'none';
  document.getElementById('scanCount').textContent = '';
  document.getElementById('dupBox').style.display = 'none';
  document.getElementById('manualPart').value = '';
  document.getElementById('manualQty').value = '';
  document.getElementById('manualUnit').value = '';
  document.getElementById('manualNote').value = '';
  setTimeout(function(){ document.getElementById('wo').focus(); }, 100);
}

function showAlert(msg, type) {
  var el = document.getElementById('alertBox');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display='none'; }, 5000);
}

function clearAll() {
  if (confirm('⚠️ ยืนยันลบข้อมูลทั้งหมด?')) db.ref('records').remove();
}
